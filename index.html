<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>WIZHUB - Resume & Progress (All Sources Working)</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23facc15'%3E%3Cpath d='M12 2L15 8.5L22 9.5L17 14L18.5 21L12 17.5L5.5 21L7 14L2 9.5L9 8.5L12 2Z'/%3E%3C/svg%3E">
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* Your existing styles – kept intact (same as before) */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0c10; font-family: 'Inter', system-ui, sans-serif; }
    .glass-nav {
      background: rgba(10, 12, 16, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(250, 204, 21, 0.2);
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 50;
      padding: 0.75rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .brand { display: flex; align-items: center; gap: 0.5rem; }
    .brand i { font-size: 1.8rem; }
    .brand span {
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #facc15, #e5b80b);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: 1px;
    }
    .search-wrapper {
      flex: 1 1 auto;
      min-width: 200px;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: #1a1d24;
      border: 1px solid #2d2f3e;
      border-radius: 2rem;
      padding: 0.6rem 2.5rem 0.6rem 2.5rem;
      color: #f0f0f0;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: #facc15;
      box-shadow: 0 0 0 2px rgba(250,204,21,0.2);
    }
    .clear-search {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      display: none;
    }
    .clear-search:hover { color: #facc15; }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .nav-btn {
      background: transparent;
      border: 1px solid #facc15;
      color: #facc15;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      white-space: nowrap;
    }
    .nav-btn:hover {
      background: #facc15;
      color: #0a0c10;
    }
    .avatar-wrapper { position: relative; }
    .user-avatar {
      width: 40px;
      height: 40px;
      background: #facc15;
      color: #0a0c10;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.2rem;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .user-avatar:hover { transform: scale(1.02); }
    .avatar-dropdown {
      position: absolute;
      top: 48px;
      right: 0;
      background: #1e212b;
      border: 1px solid #facc15;
      border-radius: 0.75rem;
      padding: 0.5rem;
      min-width: 130px;
      z-index: 60;
      display: none;
      flex-direction: column;
      gap: 0.25rem;
      backdrop-filter: blur(8px);
    }
    .avatar-dropdown.show { display: flex; }
    .dropdown-item {
      background: transparent;
      color: #e0e0e0;
      border: none;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
      width: 100%;
    }
    .dropdown-item:hover {
      background: #facc15;
      color: #0a0c10;
    }
    @media (max-width: 768px) {
      main { padding-top: 8rem !important; }
    }
    .movie-card {
      transition: transform 0.25s ease, box-shadow 0.25s;
      cursor: pointer;
      background: #14161f;
      border-radius: 1rem;
      overflow: hidden;
      position: relative;
    }
    .movie-card:hover { transform: translateY(-6px); box-shadow: 0 20px 30px -12px rgba(0,0,0,0.6); }
    .progress-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      background: #facc15;
      width: 0%;
      transition: width 0.2s;
    }
    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ff5555;
      cursor: pointer;
      z-index: 20;
    }
    .delete-btn:hover { background: #ff5555; color: white; }
    .embed-container {
      background: #000;
      border-radius: 1rem;
      overflow: hidden;
      aspect-ratio: 16/9;
      box-shadow: 0 8px 20px rgba(0,0,0,0.5);
    }
    iframe { width: 100%; height: 100%; border: none; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #1e1f2c; }
    ::-webkit-scrollbar-thumb { background: #facc15; border-radius: 10px; }
    .horizontal-scroll {
      display: flex;
      overflow-x: auto;
      gap: 1rem;
      scrollbar-width: thin;
      padding-bottom: 0.5rem;
      -webkit-overflow-scrolling: touch;
    }
    .horizontal-scroll .movie-card { flex: 0 0 140px; }
    @media (min-width: 768px) { .horizontal-scroll .movie-card { flex: 0 0 160px; } }
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    .modal-content {
      background: #1e1f2c;
      border-radius: 1rem;
      padding: 1.5rem;
      width: 90%;
      max-width: 500px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .source-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem;
      background: #2a2c38;
      margin-bottom: 0.5rem;
      border-radius: 0.5rem;
    }
    .trending-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }
    @media (min-width: 640px) { .trending-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 768px) { .trending-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 1024px) { .trending-grid { grid-template-columns: repeat(5, 1fr); } }
    @media (min-width: 1280px) { .trending-grid { grid-template-columns: repeat(6, 1fr); } }
    input, select, button { font-size: 16px; }

    .player-modern {
      background: linear-gradient(145deg, #101218, #0b0d12);
      border-radius: 1.5rem;
      border: 1px solid rgba(250, 204, 21, 0.15);
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
      overflow: hidden;
    }
    .info-section { padding: 1.5rem; }
    .info-row {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    @media (min-width: 768px) {
      .info-row {
        flex-direction: row;
        align-items: flex-start;
      }
      .poster-col { flex: 0 0 140px; }
      .details-col { flex: 1; }
    }
    .poster-wrapper {
      border-radius: 1rem;
      overflow: hidden;
      background: #07090e;
      box-shadow: 0 10px 20px rgba(0,0,0,0.4);
    }
    .poster-wrapper img { width: 100%; height: auto; display: block; }
    .rating-badge {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .type-badge {
      background: #facc1522;
      border: 1px solid #facc1544;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      text-transform: uppercase;
      font-weight: 500;
    }
    .overview-text {
      color: #b0b8cc;
      line-height: 1.5;
      font-size: 0.9rem;
    }
    .control-group {
      background: rgba(0,0,0,0.3);
      border-radius: 1rem;
      padding: 0.75rem;
    }
    .select-modern {
      background: #1a1d24;
      border: 1px solid #2d2f3e;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.85rem;
      color: white;
      transition: all 0.2s;
    }
    .select-modern:hover, .select-modern:focus { border-color: #facc15; outline: none; }
    .btn-icon {
      background: #1e212b;
      border: none;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      font-weight: 500;
      transition: all 0.2s;
      color: #e0e0e0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-icon:hover { background: #2a2e3a; color: #facc15; transform: translateY(-1px); }
    .btn-primary {
      background: #facc15;
      color: #0a0c10;
      border: none;
      border-radius: 2rem;
      padding: 0.4rem 1.2rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: #e5b80b; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(250,204,21,0.2); }
    .progress-input {
      background: #1a1d24;
      border: 1px solid #2d2f3e;
      border-radius: 2rem;
      padding: 0.4rem 1rem;
      width: 90px;
      text-align: center;
    }
    .episode-nav-modern {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }
    .episode-nav-modern button {
      background: #1e212b;
      border: none;
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      font-size: 0.8rem;
      transition: all 0.2s;
    }
    .episode-nav-modern button:hover:not(:disabled) { background: #facc15; color: #0a0c10; }
    .episode-nav-modern button:disabled { opacity: 0.4; cursor: not-allowed; }
    @media (max-width: 768px) {
      .info-section { padding: 1rem; }
      .control-group .flex-wrap { justify-content: center; }
    }
    .copy-title-icon {
      cursor: pointer;
      margin-left: 0.5rem;
      font-size: 0.9rem;
      color: #9ca3af;
      transition: color 0.2s;
    }
    .copy-title-icon:hover { color: #facc15; }
    .title-wrapper {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .continue-section-hidden {
      display: none !important;
    }
    .toast-notification {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2c38;
      color: #facc15;
      padding: 8px 16px;
      border-radius: 9999px;
      font-size: 14px;
      z-index: 300;
      animation: fadeOut 2s forwards;
    }
    @keyframes fadeOut {
      0% { opacity: 1; }
      70% { opacity: 1; }
      100% { opacity: 0; visibility: hidden; }
    }
  </style>
</head>
<body class="text-gray-200">

<nav class="glass-nav">
  <div class="brand"><i class="fas fa-crown text-yellow-400"></i><span>WIZHUB</span></div>
  <div class="search-wrapper">
    <i class="fas fa-search search-icon"></i>
    <input type="text" id="globalSearch" placeholder="Search movies or TV shows..." class="search-input" autocomplete="off">
    <button id="clearSearchBtn" class="clear-search" aria-label="Clear search"><i class="fas fa-times-circle"></i></button>
  </div>
  <div class="nav-right">
    <a href="oglist.html" class="nav-btn" target="_self"><i class="fas fa-link mr-1"></i> OGList</a>
    <div id="userContainer" class="hidden avatar-wrapper">
      <div class="user-avatar" id="userAvatar">U</div>
      <div id="avatarDropdown" class="avatar-dropdown"><button id="dropdownLogoutBtn" class="dropdown-item">Logout</button></div>
    </div>
    <div id="authContainer" class="flex gap-2">
      <button id="showLoginBtn" class="nav-btn">Login</button>
      <button id="showSignupBtn" class="nav-btn bg-yellow-500 text-black border-yellow-500 hover:bg-yellow-400">Sign up</button>
    </div>
  </div>
</nav>

<main class="pt-24 pb-12 px-4 md:px-8 max-w-7xl mx-auto">
  <section id="continueWatchingSection" class="mb-12">
    <h2 class="text-xl md:text-2xl font-bold flex items-center gap-2 mb-4"><i class="fas fa-history text-yellow-400"></i> Continue Watching</h2>
    <div id="continueWatchingContainer" class="horizontal-scroll"><div class="text-gray-400 text-sm">Log in to see your watch history.</div></div>
  </section>

  <div id="playerPanel" class="hidden mb-12 player-modern">
    <div class="embed-container"><iframe id="embedIframe" allowfullscreen referrerpolicy="no-referrer" allow="autoplay; encrypted-media"></iframe></div>
    <div class="info-section">
      <div id="tvControls" class="hidden mb-4">
        <div class="control-group flex flex-wrap items-center justify-between gap-3">
          <div class="flex flex-wrap gap-3 items-center">
            <select id="seasonSelect" class="select-modern"></select>
            <select id="episodeSelect" class="select-modern"></select>
          </div>
          <div class="episode-nav-modern">
            <button id="prevEpisodeBtn" class="text-sm" disabled><i class="fas fa-step-backward"></i> Previous</button>
            <button id="nextEpisodeBtn" class="text-sm" disabled>Next <i class="fas fa-step-forward"></i></button>
          </div>
        </div>
      </div>
      <div class="space-y-3 mb-6">
        <div class="control-group flex flex-wrap items-center gap-2">
          <span class="text-sm font-medium text-gray-300">Source:</span>
          <select id="sourceSelect" class="select-modern flex-1 min-w-[130px]"></select>
          <div class="flex flex-wrap gap-2">
            <button id="reloadEmbedBtn" class="btn-icon"><i class="fas fa-sync-alt"></i> Reload</button>
            <button id="nextSourceBtn" class="btn-icon"><i class="fas fa-forward"></i> Next</button>
            <button id="copyUrlBtn" class="btn-icon"><i class="fas fa-copy"></i> Copy URL</button>
            <button id="orderSourcesBtn" class="btn-icon" title="Reorder sources"><i class="fas fa-arrows-alt"></i> Order</button>
          </div>
        </div>
        <div class="control-group flex flex-wrap items-center gap-4">
          <span class="text-sm"><i class="fas fa-clock text-yellow-400"></i> Watched (minutes):</span>
          <input type="number" id="progressMinutes" value="0" step="1" min="0" class="progress-input">
          <button id="saveProgressBtn" class="btn-primary"><i class="fas fa-save"></i> Save Time</button>
        </div>
      </div>
      <div class="info-row">
        <div class="poster-col"><div class="poster-wrapper rounded-xl shadow-lg"><img id="detailPoster" src="https://placehold.co/300x450" alt="poster"></div></div>
        <div class="details-col">
          <div class="flex justify-between items-start flex-wrap gap-2">
            <div class="title-wrapper"><h2 id="detailTitle" class="text-xl md:text-2xl font-bold tracking-tight bg-gradient-to-r from-white to-gray-300 bg-clip-text text-transparent cursor-pointer" title="Click to copy title"></h2><i class="fas fa-copy copy-title-icon" title="Copy title to clipboard"></i></div>
            <button id="closePlayerBtn" class="text-gray-400 hover:text-white text-xl">&times;</button>
          </div>
          <div class="flex flex-wrap items-center gap-3 mt-2">
            <div class="rating-badge"><i class="fas fa-star text-yellow-400 text-xs"></i><span id="detailRating">—</span><span class="text-gray-400 text-xs">/10</span></div>
            <span class="text-sm"><i class="fas fa-calendar-alt text-gray-400 mr-1"></i><span id="detailYear">—</span></span>
            <span class="type-badge" id="detailType">—</span>
          </div>
          <p id="detailOverview" class="overview-text mt-3 text-sm md:text-base leading-relaxed"></p>
        </div>
      </div>
    </div>
  </div>

  <section class="mb-12"><h2 class="text-xl md:text-2xl font-bold flex items-center gap-2 mb-5"><i class="fas fa-fire text-orange-500"></i> Trending Movies</h2><div id="trendingMoviesGrid" class="trending-grid"></div></section>
  <section class="mb-12"><h2 class="text-xl md:text-2xl font-bold flex items-center gap-2 mb-5"><i class="fas fa-tv text-purple-400"></i> Trending TV Shows</h2><div id="trendingTvGrid" class="trending-grid"></div></section>
</main>

<div id="orderModal" class="modal"><div class="modal-content"><h3 class="text-xl font-bold mb-4">Reorder Stream Sources</h3><div id="sourceList" class="mb-4" style="max-height: 50vh; overflow-y: auto;"></div><div class="flex gap-2"><button id="saveOrderBtn" class="bg-green-600 px-4 py-2 rounded-full">Save Order</button><button id="closeOrderBtn" class="bg-gray-600 px-4 py-2 rounded-full">Cancel</button></div></div></div>
<div id="loginModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden"><div class="bg-gray-900 rounded-2xl p-6 w-11/12 max-w-md border border-yellow-500/30 relative"><h3 class="text-xl font-bold mb-4">Login</h3><input type="email" id="loginEmail" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-3"><input type="password" id="loginPassword" placeholder="Password" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-4"><button id="doLoginBtn" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-semibold">Login</button><p class="text-sm text-center mt-3">No account? <a id="switchToSignupModal" class="text-yellow-400 cursor-pointer">Sign up</a></p><button class="closeModal absolute top-2 right-4 text-gray-400 text-2xl">&times;</button></div></div>
<div id="signupModal" class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 hidden"><div class="bg-gray-900 rounded-2xl p-6 w-11/12 max-w-md border border-yellow-500/30 relative"><h3 class="text-xl font-bold mb-4">Create Account</h3><input type="email" id="signupEmail" placeholder="Email" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-3"><input type="password" id="signupPassword" placeholder="Password (min 6)" class="w-full bg-gray-800 border border-gray-700 rounded-lg p-2 mb-4"><button id="doSignupBtn" class="w-full bg-yellow-500 text-black py-2 rounded-lg font-semibold">Sign Up</button><p class="text-sm text-center mt-3">Already have an account? <a id="switchToLoginModal" class="text-yellow-400 cursor-pointer">Login</a></p><button class="closeModal absolute top-2 right-4 text-gray-400 text-2xl">&times;</button></div></div>

<script>
(function() {
  // ================= SOURCES =================
  const DEFAULT_SOURCES = [
    { name: 'Videasy', url: (type, id, s, e, progressSec) => {
        let base = type === 'movie' ? `https://player.videasy.net/movie/${id}` : `https://player.videasy.net/tv/${id}/${s}/${e}`;
        return progressSec > 0 ? base + `?progress=${progressSec}` : base;
      }
    },
    { name: 'VidFast', url: (type, id, s, e, progressSec) => {
        let base = type === 'movie' ? `https://vidfast.pro/movie/${id}?autoPlay=true` : `https://vidfast.pro/tv/${id}/${s}/${e}?autoPlay=true`;
        return progressSec > 0 ? base + `&t=${progressSec}` : base;
      }
    },
    { name: 'VidUp', url: (type, id, s, e) => type === 'movie' ? `https://vidup.to/movie/${id}` : `https://vidup.to/tv/${id}/${s}/${e}` },
    { name: 'VixSrc', url: (type, id, s, e, progressSec) => {
        let base = type === 'movie' ? `https://vixsrc.to/movie/${id}` : `https://vixsrc.to/tv/${id}/${s}/${e}`;
        return progressSec > 0 ? base + `?startAt=${progressSec}` : base;
      }
    },
    // ... rest of sources (unchanged)
    { name: 'EmbedMaster', url: (type, id, s, e) => type === 'movie' ? `https://embedmaster.link/movie/${id}` : `https://embedmaster.link/tv/${id}/${s}/${e}` },
    { name: 'ZxcStream', url: (type, id, s, e) => type === 'movie' ? `https://zxcstream.xyz/player/movie/${id}` : `https://zxcstream.xyz/player/tv/${id}/${s}/${e}` },
    { name: 'AnyEmbed', url: (type, id, s, e) => type === 'movie' ? `https://anyembed.xyz/embed/tmdb-movie-${id}` : `https://anyembed.xyz/embed/tmdb-tv-${id}-${s}-${e}` },
    { name: '111Movies', url: (type, id, s, e) => type === 'movie' ? `https://111movies.net/movie/${id}` : `https://111movies.net/tv/${id}/${s}/${e}` },
    { name: 'Vidsrc', url: (type, id, s, e) => type === 'movie' ? `https://vidsrc.to/embed/movie/${id}` : `https://vidsrc.to/embed/tv/${id}/${s}/${e}` },
    { name: 'VidCore', url: (type, id, s, e) => type === 'movie' ? `https://vidcore.net/movie/${id}` : `https://vidcore.net/tv/${id}/${s}/${e}` },
    { name: 'VAPlayer', url: (type, id, s, e) => type === 'movie' ? `https://vaplayer.ru/embed/movie/${id}` : `https://vaplayer.ru/embed/tv/${id}/${s}/${e}` },

  // ========== AUTO-SAVE HELPER ==========
  let autoSaveTimer = null;
  function autoSaveProgress(seconds, sourceName) {
    if (!currentUser || !currentMedia) return;
    if (Math.abs(seconds - currentProgressSeconds) < 5) return;
    currentProgressSeconds = seconds;
    currentProgressMinutes = Math.floor(seconds / 60);
    progressMinutesInput.value = currentProgressMinutes;
    if (autoSaveTimer) clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => { saveProgressToDB(); }, 1000);
    console.log(`Auto-save from ${sourceName}: ${seconds} seconds`);
  }

  // ========== VIDEASY MESSAGE HANDLER (FIXED) ==========
  function handleVideasyMessage(data) {
    // If data is a string, parse it first
    let msg = data;
    if (typeof data === 'string') {
      try {
        msg = JSON.parse(data);
      } catch(e) {
        return;
      }
    }
    if (!msg || typeof msg !== 'object') return;

    console.log("Videasy message:", msg);

    // Case 1: direct timestamp field
    if (typeof msg.timestamp === 'number') {
      autoSaveProgress(msg.timestamp, 'Videasy(timestamp)');
      return;
    }

    // Case 2: type "MEDIA_DATA" with data string containing progress.watched
    if (msg.type === 'MEDIA_DATA' && typeof msg.data === 'string') {
      try {
        const inner = JSON.parse(msg.data);
        // inner is like { "tv-1668": { "progress": { "watched": 123 } } }
        for (let key in inner) {
          const item = inner[key];
          if (item?.progress?.watched !== undefined) {
            const watchedSec = item.progress.watched;
            if (typeof watchedSec === 'number') {
              autoSaveProgress(watchedSec, 'Videasy(MEDIA_DATA)');
              return;
            }
          }
        }
      } catch(e) {}
    }

    // Case 3: timeupdate event
    if (msg.event === 'timeupdate' && typeof msg.currentTime === 'number') {
      autoSaveProgress(msg.currentTime, 'Videasy(timeupdate)');
    }
  }

  // ========== POSTMESSAGE HANDLER ==========
  window.addEventListener("message", (event) => {
    const { origin, data } = event;
    if (!data) return;

    // ---- VIDEASY ----
    if (origin.includes('videasy')) {
      handleVideasyMessage(data);
      return;
    }

    // ---- VidFast ----
    if (origin.includes('vidfast')) {
      if (data.type === 'PLAYER_EVENT' && data.data?.currentTime) {
        autoSaveProgress(Math.floor(data.data.currentTime), 'VidFast');
      }
      if (data.type === 'MEDIA_DATA') {
        const media = data.data?.[currentMedia?.id];
        if (media?.progress?.watched) {
          autoSaveProgress(media.progress.watched, 'VidFast');
        }
      }
      return;
    }

    // ---- VixSrc ----
    if (origin.includes('vixsrc') || origin.includes('vixcloud')) {
      if (data?.type !== "PLAYER_EVENT") return;
      let eventName = data.data?.event;
      let currentTime = Math.floor(data.data?.currentTime || 0);
      if (!eventName && data.event?.event) {
        eventName = data.event.event;
        currentTime = Math.floor(data.event.currentTime || 0);
      }
      if (currentTime > 0) {
        currentProgressSeconds = currentTime;
        currentProgressMinutes = Math.floor(currentTime / 60);
        progressMinutesInput.value = currentProgressMinutes;
        if (eventName === "timeupdate" && (currentTime - lastSavedSecond) >= 15) {
          lastSavedSecond = currentTime;
          saveProgressToDB();
          console.log("Auto-saved from VixSrc timeupdate at", currentTime);
        }
        if (eventName === "seeked" && currentTime > 0) {
          lastSavedSecond = currentTime;
          saveProgressToDB();
          console.log("Saved after VixSrc seek at", currentTime);
        }
        if (eventName === "pause" || eventName === "ended") {
          lastSavedSecond = currentTime;
          saveProgressToDB();
          console.log(`Saved on VixSrc ${eventName} at`, currentTime);
        }
      }
      return;
    }
  });
