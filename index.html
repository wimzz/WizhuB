<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WizhuB • Debug Mode</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background: #0a0c10; font-family: monospace; }
    #log { background: #1e1f2c; color: #0f0; padding: 1rem; border-radius: 0.5rem; max-height: 300px; overflow-y: auto; font-size: 12px; margin-top: 1rem; }
  </style>
</head>
<body class="text-white p-6">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-3xl font-bold mb-4">WizhuB – Debug Mode</h1>
    <div class="bg-gray-900 p-4 rounded-xl mb-4">
      <button id="testSupabase" class="bg-blue-600 px-4 py-2 rounded mr-2">Test Supabase Connection</button>
      <button id="testTrending" class="bg-green-600 px-4 py-2 rounded">Test TMDB Trending</button>
      <div id="status" class="mt-3 text-yellow-400"></div>
    </div>
    <div id="log"></div>
  </div>

  <script>
    // ========== YOUR CREDENTIALS ==========
    const SUPABASE_URL = 'https://evhtzfkxolnlqlmjewew.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2aHR6Zmt4b2xubHFsbWpld2V3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyOTMzOTUsImV4cCI6MjA5NTg2OTM5NX0.42bpsGRyKSZcQ3EUj1k3grsUVuXtZWKsce7OKv8J5YU';
    const TMDB_API_KEY = 'cf3fd5ed845e76f7c6786a61e521006c';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const logDiv = document.getElementById('log');
    const statusDiv = document.getElementById('status');

    function addLog(msg, isError = false) {
      const entry = document.createElement('div');
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      entry.style.color = isError ? '#ff8888' : '#88ff88';
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
      console.log(msg);
    }

    document.getElementById('testSupabase').onclick = async () => {
      addLog('Testing Supabase connection...');
      try {
        // Test 1: Check if we can get the current session
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();
        if (sessionError) throw sessionError;
        addLog(`✅ Supabase auth reachable. Session exists: ${!!session}`);
        
        // Test 2: Attempt to read from watch_history table (will fail if no auth, but we check table existence)
        const { error: tableError } = await supabase.from('watch_history').select('count', { count: 'exact', head: true });
        if (tableError) {
          if (tableError.message.includes('relation') && tableError.message.includes('does not exist')) {
            addLog('❌ Table "watch_history" does not exist! Run the SQL script.', true);
          } else {
            addLog(`⚠️ Table exists but query failed: ${tableError.message}`, true);
          }
        } else {
          addLog('✅ Table "watch_history" exists and accessible.');
        }
      } catch (err) {
        addLog(`❌ Supabase error: ${err.message}`, true);
      }
    };

    document.getElementById('testTrending').onclick = async () => {
      addLog('Fetching trending movies from TMDB...');
      try {
        const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${TMDB_API_KEY}`);
        const data = await res.json();
        if (data.results && data.results.length) {
          addLog(`✅ TMDB works! Got ${data.results.length} movies. First: ${data.results[0].title}`);
        } else {
          addLog(`❌ TMDB returned no results. Check API key.`, true);
        }
      } catch (err) {
        addLog(`❌ TMDB error: ${err.message}`, true);
      }
    };

    addLog('Ready. Click buttons to test.');
  </script>
</body>
</html>
